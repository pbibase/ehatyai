<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eHatyai.com Launcher</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;600;800;900&family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f172a;
      --card-bg: #1e293b;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --border: #334155;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: 'Outfit', 'Noto Sans Thai', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    
    .card {
      background-color: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 1.5rem;
      padding: 3rem;
      width: 100%;
      max-width: 500px;
      text-align: center;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(10px);
    }
    
    .logo {
      font-size: 2.5rem;
      font-weight: 900;
      color: var(--text);
      margin-bottom: 0.5rem;
      letter-spacing: -0.05em;
    }
    
    .logo span {
      color: #3b82f6;
    }
    
    .subtitle {
      font-size: 1rem;
      color: var(--text-muted);
      margin-bottom: 2rem;
      font-weight: 400;
    }
    
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background-color: var(--primary);
      color: var(--text);
      font-weight: 800;
      text-decoration: none;
      padding: 1rem 2rem;
      border-radius: 0.75rem;
      width: 100%;
      transition: all 0.2s ease;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
      font-size: 1.1rem;
    }
    
    .btn:hover {
      background-color: var(--primary-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(37, 99, 235, 0.3);
    }
    
    .redirect-text {
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    
    .links-section {
      margin-top: 2.5rem;
      border-top: 1px solid var(--border);
      padding-top: 1.5rem;
      text-align: left;
    }
    
    .links-title {
      font-size: 0.8rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }
    
    .links-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    
    .links-list a {
      color: #60a5fa;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 600;
      transition: color 0.2s ease;
    }
    
    .links-list a:hover {
      color: #93c5fd;
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1 class="logo">eHatyai<span>.com</span></h1>
    <p class="subtitle">ระบบจองที่พักหาดใหญ่ / สงขลา</p>
    
    <a href="#" id="launch-btn" class="btn">🚀 เข้าสู่เว็บไซต์แอปพลิเคชัน</a>
    
    <p class="redirect-text">กำลังนำท่านไปที่ <span id="target-url-text">...</span> ใน <span id="countdown">3</span> วินาที...</p>
    
    <div class="links-section">
      <h3 class="links-title">เอกสารโครงการ (Project Docs)</h3>
      <ul class="links-list">
        <li>📁 <a href="file:///c:/Sandbox/Projects/ehatyai/TRACEABILITY.md" target="_blank">TRACEABILITY.md (ข้อกำหนดโครงการ)</a></li>
        <li>📁 <a href="file:///c:/Sandbox/Projects/ehatyai/CLAUDE.md" target="_blank">CLAUDE.md (รัฐธรรมนูญโครงการ)</a></li>
      </ul>
    </div>
  </div>

  <script>
    const isLocal = window.location.protocol === 'file:';
    
    // Base URL of the project
    const baseUrl = isLocal 
      ? 'http://localhost:3000' 
      : window.location.href.split('?')[0].split('#')[0].replace(/index\.html$/, '').replace(/\/$/, '');

    // Redirect to '/results' on the web server to bypass index.html static interception
    const targetUrl = isLocal ? baseUrl : (baseUrl + '/results');

    document.getElementById('launch-btn').href = targetUrl;
    document.getElementById('target-url-text').textContent = targetUrl;

    let seconds = 3;
    const countdownEl = document.getElementById('countdown');
    
    const interval = setInterval(() => {
      seconds--;
      countdownEl.textContent = seconds;
      if (seconds <= 0) {
        clearInterval(interval);
        window.location.href = targetUrl;
      }
    }, 1000);
  </script>
</body>
</html>
